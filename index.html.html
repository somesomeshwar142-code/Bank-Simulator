<!DOCTYPE html>
<html lang="en">
<head>
    <title>Bank Simulator</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Inter", sans-serif;
            background: linear-gradient(135deg, #dbeafe, #e0f2fe, #f0fdfa);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            width: 350px;
            padding: 30px;
            border-radius: 15px;
            
            background: rgba(255, 255, 255, 0.7);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        h2 {
            margin-bottom: 20px;
            color: #1f2937;
        }

        input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #d1d5db;
            margin-bottom: 25px;
        }

        input:focus {
            border-color: #7d8086;
            outline: none;
        }

        .buttons {
            display: flex;
            gap: 10px;
        }

        button {
          
            padding: 9px;
            border-radius: 8px;
            border: none;
            background: linear-gradient(135deg, #2563eb, #1e40af);
            color: rgb(255, 255, 255);
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            color: #000000;
        }

        .output {
            margin-top: 20px;
            padding: 10px;
            border-radius: 8px;
            background: #f9fafb;
            border: 1px solid #e5e7eb;
            color: #374151;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>🏦 Bank Account</h2>

    <input type="number" id="amount" placeholder="Enter Amount">

    <div class="buttons">
        <button onclick="deposit()">Deposit😒</button>
        <button onclick="withdraw()">Withdraw😁</button>
        <button onclick="checkBalance()">Balance💸</button>
    </div>

    <div class="output" id="output">
        Balance: ₹0
    </div>
</div>

<script>
class BankAccount {
    constructor() {
        this.balance = 0;
    }

    deposit(amount) {
        if (amount > 0) {
            this.balance += amount;
            return "Deposited: ₹" + amount;
        }
        return "Invalid amount";
    }

    withdraw(amount) {
        if (amount > this.balance) {
            return "Insufficient balance";
        }
        this.balance -= amount;
        return "Withdrawn: ₹" + amount;
    }

    getBalance() {
        return "Current Balance: ₹" + this.balance;
    }
}

const acc = new BankAccount();

function deposit() {
    let amt = Number(document.getElementById("amount").value);
    show(acc.deposit(amt));
}

function withdraw() {
    let amt = Number(document.getElementById("amount").value);
    show(acc.withdraw(amt));
}

function checkBalance() {
    show(acc.getBalance());
}

function show(msg) {
    document.getElementById("output").innerText = msg;
}
</script>

</body>
</html>
